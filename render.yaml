services:
  # Backend Service (Django)
  - type: web
    name: symptoscan-backend
    runtime: python
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_2Slr1oPHewgE@ep-fancy-heart-aknlez8c.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        # FIXED: exact frontend URL (not the wrong generic one)
        value: "https://symptoscan-frontend-yjxv.onrender.com"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Frontend Service (React/Vite)
  - type: static
    name: symptoscan-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        # FIXED: hardcode the correct full URL with https:// prefix
        # 'property: host' only gives hostname without protocol, which breaks API calls
        value: "https://symptoscan-nbo5.onrender.com"
    routes:
      - type: rewrite
        src: "/*"
        dest: "/index.html"
